services:
  db:
    image: postgres:15-alpine
    container_name: delinoapp-db
    environment:
      POSTGRES_DB: delinoapp
      POSTGRES_USER: delinoapp
      POSTGRES_PASSWORD: delinoapp
    ports:
      - "5432:5432"
    volumes:
      - delinoapp_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delinoapp -d delinoapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  delinoapp_db:
